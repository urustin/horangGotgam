<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="./env.js"></script>
  <script>
    (function () {
      var t = (window.__HORANG_CONFIG__ || {}).productType;
      document.documentElement.classList.add("product-" + (t === "durup" ? "durup" : "gotgam"));
    })();
  </script>

  <title>계좌 확인 — 해청농원 호랑곶감</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <link rel="stylesheet" href="./src/css/pages/check-order.css">

  <style>
    .bank-page {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px 40px;
      text-align: center;
    }
    .bank-eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-brand);
      margin-bottom: 16px;
    }
    .bank-title {
      font-family: var(--f-serif);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1.2;
      margin-bottom: 40px;
    }
    .bank-card {
      background: var(--c-bg-card);
      border: 1px solid var(--c-border-light);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: var(--sh-md);
      margin-bottom: 24px;
    }
    .bank-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 12px;
    }
    .bank-number {
      font-family: var(--f-serif);
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--c-text);
      margin-bottom: 8px;
    }
    .bank-holder {
      font-size: 0.9375rem;
      color: var(--c-text-sub);
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--c-brand);
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-family: var(--f-sans);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 250ms cubic-bezier(.4,0,.2,1);
      margin-top: 8px;
    }
    .copy-btn:hover { background: var(--c-brand-dark); transform: translateY(-2px); box-shadow: var(--sh-md); }
    .copy-btn:active { transform: translateY(0); }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      font-size: 0.875rem;
      color: var(--c-text-muted);
      transition: color 150ms ease;
    }
    .back-link:hover { color: var(--c-text); }
  </style>
</head>
<body>
  <div class="bank-page">
    <span class="bank-eyebrow">입금 안내</span>
    <h1 class="bank-title">해청농원<br>입금 계좌</h1>

    <div class="bank-card">
      <p class="bank-label">농협은행</p>
      <p class="bank-number">352-1386-3306-83</p>
      <p class="bank-holder">예금주: 이광호</p>
    </div>

    <button class="copy-btn" onclick="copyAccount()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M3 11V3h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      계좌번호 복사하기
    </button>

    <br>
    <a href="./" class="back-link">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 4L6 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      홈으로 돌아가기
    </a>
  </div>

  <script>
    function copyAccount() {
      const text = '농협 352-1386-3306-83';
      navigator.clipboard.writeText(text).then(() => {
        alert(text + '\n계좌번호가 복사되었습니다!');
      }).catch(() => {
        alert('복사에 실패했습니다. 직접 입력해주세요: ' + text);
      });
    }
  </script>
</body>
</html>
