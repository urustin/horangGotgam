<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 확인 — 해청농원 호랑곶감</title>

  <meta property="og:title" content="해청농원 곶감 주문 확인">
  <meta property="og:description" content="해청농원 주문 내역을 조회하세요">
  <meta property="og:image" content="https://horang-gotgam.vercel.app/images/gotgam/1.jpeg">
  <meta property="og:url" content="https://horang-gotgam.vercel.app/checkOrder.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="해청농원 곶감 주문 확인">
  <meta name="twitter:description" content="해청농원 주문 내역을 조회하세요">
  <meta name="twitter:image" content="https://horang-gotgam.vercel.app/images/gotgam/1.jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <link rel="stylesheet" href="./src/css/pages/check-order.css">
</head>
<body>

  <!-- ── PAGE HEADER ── -->
  <header class="page-header">
    <div class="page-header__inner">
      <a href="./" class="page-header__back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 4L6 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        홈으로
      </a>
      <span class="page-header__title">주문 확인</span>
    </div>
  </header>

  <!-- ── SEARCH FORM ── -->
  <div class="search-wrap">
    <div class="search-header">
      <span class="search-eyebrow">주문 조회</span>
      <h1 class="search-title">호랑곶감 주문 확인</h1>
      <p class="search-desc">입금 확인 후 최대 24시간 후부터 조회 가능합니다.</p>
    </div>

    <div class="search-form">
      <div class="form-group">
        <label class="form-label" for="name">
          주문자 성함
          <span>— 주문서에 입력한 이름 그대로 적어주세요</span>
        </label>
        <input
          class="form-input"
          type="text"
          id="name"
          name="name"
          placeholder="홍길동"
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="phoneNumber">
          휴대폰 번호 마지막 4자리
        </label>
        <input
          class="form-input"
          type="text"
          id="phoneNumber"
          name="phoneNumber"
          placeholder="1234"
          maxlength="4"
          inputmode="numeric"
          pattern="[0-9]{4}"
        >
      </div>

      <button class="search-btn" onclick="checkOrder()">조회하기</button>
    </div>

    <div id="loading"></div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="result"></div>

  <script type="module" src="./src/js/pages/check-order.js"></script>

  <!-- Override displayOrders to use new card layout -->
  <script type="module">
    // Patch displayOrders to inject card markup after module loads
    import('./src/js/pages/check-order.js').then(() => {
      const origDisplay = window.__checkOrderPage_displayOrders;
    });
  </script>

</body>
</html>
